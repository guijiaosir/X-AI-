<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client - Message Feed</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 2rem; margin: 0; background: linear-gradient(90deg, #00ba7c, #00d084); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none;">Client Messages</h1>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="refresh-btn" class="icon-btn" title="Refresh">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                    <a href="/index.html" class="icon-btn" title="Back to Home" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    </a>
                </div>
            </div>
        </header>

        <div class="status-bar">
            <span id="connection-status">Connected</span>
            <span id="message-count">0 messages</span>
        </div>

        <div id="loading" class="hidden">Loading...</div>
        <div id="error-message" class="hidden"></div>

        <div id="messages-container">
            <!-- Messages will appear here -->
        </div>

        <div id="empty-state" class="empty-state">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="#71767b"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
            <p>No messages yet</p>
            <p class="hint">Select content to push from the main page</p>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
